git:
  filters:

  # AudioXBlock
  - filter_type: dir
    file_format: PO
    source_file_extension: po
    source_language: en
    source_file_dir: translations/AudioXBlock/audio/conf/locale/en/
    mode: onlyreviewed
    translation_files_expression: 'translations/AudioXBlock/audio/conf/locale/<lang>/'

  # completion
