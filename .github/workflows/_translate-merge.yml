# Reusable workflow: creates a pull request for a translation branch and conditionally auto-merges it.
# Auto-merge only occurs when running on the main branch via a scheduled trigger.

name: _Translate merge

on:
  workflow_call:
    inputs:
      branch:
        description: 'Branch to create a PR for and merge.'
        required: true
        type: string
      workflow_name:
        description: 'Name of the calling workflow file (without .yml), used in the PR body link.'
        required: true
        type: string
      pr_title:
        description: 'Title for the pull request.'
        required: false
        type: string
        default: 'chore: add AI translated strings'

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Clone ${{ github.repository }}
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Create pull request
        id: createPR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          COMMIT_COUNT=$(git rev-list HEAD ^origin/main | wc -l | tr -d ' ')
          echo "COMMIT_COUNT=$COMMIT_COUNT" >> $GITHUB_ENV

          if [ "$COMMIT_COUNT" -gt 0 ]; then
            PR_URL=$(gh pr create \
              --repo "$REPO" \
              --title "${{ inputs.pr_title }}" \
              --body "This PR is auto-generated by [${{ inputs.workflow_name }}](https://github.com/${REPO}/blob/main/.github/workflows/${{ inputs.workflow_name }}.yml).")
            echo "PR_URL=$PR_URL" >> $GITHUB_ENV
            echo "PR_URL=$PR_URL"
          fi

      - name: Merge pull request
        id: mergePR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Do not automerge if any of the following are true.
        # 1. the job is not running on the main branch
        # 2. the job is not running as the result of a scheduled trigger (i.e. a cron)
        # 3. there are 0 commits
        if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'schedule' && env.COMMIT_COUNT > 0 }}
        run: gh pr merge ${{ env.PR_URL }} --merge --auto

      # Notify that an empty branch did not need merging and delete it now that it is unnecessary.
      - name: Notify of empty branch and delete branch
        if: ${{ steps.mergePR.outcome == 'skipped' && env.COMMIT_COUNT == '0' }}
        run: |
          echo "The branch was not merged and was deleted because it had 0 commits."
          git push origin -d "${{ inputs.branch }}"
