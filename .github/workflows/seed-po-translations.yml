# This workflow seeds translations for Python applications, storing existing translations in ai-translations.
# This one-time action helps us avoid re-translating strings that have already been translated.

name: Seed Python Translations

on:
  workflow_dispatch:
    inputs:
      application_name:
        description: 'Python application/repository to seed translations for, case sensitive. Leave blank to run all.'
        required: false
        type: string
      translation_language:
        description: 'Language code in edX format (e.g. es-419 or pt-PT), case insensitive. Leave blank to run all.'
        required: false
        type: string

env:
  # Maximum number of translated entries to send in a single API request.
  # Can be overridden by setting the TRANSLATION_CHUNK_SIZE repository variable.
  TRANSLATION_CHUNK_SIZE: ${{ vars.TRANSLATION_CHUNK_SIZE || 500 }}

jobs:
  setup:
    uses: ./.github/workflows/_translate-setup.yml
    with:
      config_key: pythonApplications
      application_name: ${{ inputs.application_name || '' }}
      translation_language: ${{ inputs.translation_language || '' }}

  validate:
    uses: ./.github/workflows/_translate-validate-env.yml
    with:
      fetch_translations_url: ${{ vars.AI_TRANSLATIONS_SEED_PO_TRANSLATIONS_URL }}
      fetch_translations_url_name: AI_TRANSLATIONS_SEED_PO_TRANSLATIONS_URL
      lms_access_token_url: ${{ vars.LMS_ACCESS_TOKEN_URL }}
    secrets: inherit

  # Seeds regular Python applications.
  seed-po-translations:
    if: ${{ fromJson(needs.setup.outputs.has_applications) == true }}
    runs-on: ubuntu-latest
    needs: [setup, validate]
    strategy:
      matrix:
        application: ${{ fromJson(needs.setup.outputs.applications) }}
      fail-fast: false
      max-parallel: 3
    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install translation script requirements
        run: pip install -r requirements/translations.txt

      - name: Seed Python PO translations for ${{ matrix.application.appName }}
        env:
          LMS_ACCESS_TOKEN_URL: ${{ vars.LMS_ACCESS_TOKEN_URL }}
          EDX_TRANSLATIONS_PROD_CLIENT_ID: ${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_ID }}
          EDX_TRANSLATIONS_PROD_CLIENT_SECRET: ${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_SECRET }}
        run: |
          . .github/scripts/fetch_jwt.sh

          translation_languages='${{ needs.setup.outputs.translation_languages }}'
          app_dir="translations/${{ matrix.application.appName }}"

          # Skip the application entirely if its translations directory hasn't been
          # populated yet (e.g. a newly added app with no extracted strings).
          if [ ! -d "$app_dir" ]; then
            echo "Application directory does not exist: $app_dir. Skipping application."
            exit 0
          fi

          locale_base=$(find "$app_dir" -type d -path "*/conf/locale" | head -1)

          if [ -z "$locale_base" ]; then
            echo "No conf/locale directory found under $app_dir. Skipping."
            exit 0
          fi

          echo "Found locale base: $locale_base"

          num_failures=0
          num_attempted=0

          # Loop through selected languages
          while IFS= read -r lang; do
            # Re-fetch JWT per language to prevent token expiry on long-running jobs.
            fetch_jwt || exit 1

            edxLang=$(echo "$lang" | jq -r '.edxLang')
            repoLang=$(echo "$lang" | jq -r '.repoLang')

            echo "Processing language $edxLang for application ${{ matrix.application.appName }}."

            po_dir="${locale_base}/${repoLang}/LC_MESSAGES"

            # Skip individual languages that haven't been translated yet; not every app
            # has a directory for every supported language.
            if [ ! -d "$po_dir" ]; then
              echo "PO directory does not exist: $po_dir. Skipping."
              echo ""
              continue
            fi

            for po_file in "$po_dir"/*.po; do
              [ -f "$po_file" ] || continue

              echo "Processing file $po_file"

              num_attempted=$((num_attempted+1))

              # Validate chunk size is a positive integer; fall back to 500 if unset or invalid.
              if [[ "$TRANSLATION_CHUNK_SIZE" =~ ^[1-9][0-9]*$ ]]; then
                chunk_size="$TRANSLATION_CHUNK_SIZE"
              else
                echo "::warning::TRANSLATION_CHUNK_SIZE ('$TRANSLATION_CHUNK_SIZE') is not a positive integer. Falling back to 500."
                chunk_size=500
              fi

              chunk_dir="/tmp/po_chunks_${edxLang}_$(basename "$po_file" .po)"
              rm -rf "$chunk_dir"

              mapfile -t chunk_files < <(python scripts/split_po_file.py \
                --input "$po_file" \
                --output-dir "$chunk_dir" \
                --chunk-size "$chunk_size")

              if [ "${#chunk_files[@]}" -eq 0 ]; then
                echo "No translated entries in $po_file. Skipping."
                echo ""
                continue
              fi

              num_chunks="${#chunk_files[@]}"
              echo "Split into $num_chunks chunk(s)."

              file_failed=0
              for chunk_idx in "${!chunk_files[@]}"; do
                chunk_file="${chunk_files[$chunk_idx]}"
                echo "Seeding chunk $((chunk_idx + 1)) of $num_chunks for $po_file"

                > /tmp/seed_po_response.txt
                curl_exit_code=0
                status_code=$(curl -sS \
                  --connect-timeout 10 \
                  --max-time 180 \
                  -w "%{http_code}" \
                  -o /tmp/seed_po_response.txt \
                  -X POST "${{ vars.AI_TRANSLATIONS_SEED_PO_TRANSLATIONS_URL }}" \
                  -F "application_name=${{ matrix.application.appName }}" \
                  -F "translation_language=$edxLang" \
                  -F "source_language=en" \
                  -F "translation_file=@$chunk_file" \
                  -H "Authorization: JWT ${JWT_TOKEN}") || curl_exit_code=$?

                if [ "$curl_exit_code" -ne 0 ]; then
                  echo "Curl request to seed translations failed for chunk $((chunk_idx + 1)) of $num_chunks of $po_file with exit code $curl_exit_code."
                  cat /tmp/seed_po_response.txt
                  file_failed=1
                  break
                fi

                if [ "$status_code" -eq 200 ]; then
                  echo "Successfully seeded chunk $((chunk_idx + 1)) of $num_chunks"
                else
                  echo "Failed seeding chunk $((chunk_idx + 1)) of $num_chunks of $po_file with status $status_code"
                  cat /tmp/seed_po_response.txt
                  file_failed=1
                  break
                fi
              done

              if [ "$file_failed" -ne 0 ]; then
                num_failures=$((num_failures+1))
              else
                echo "Successfully seeded all chunks for $po_file"
              fi

              echo ""
            done
          done < <(echo "$translation_languages" | jq -c '.[]')

          # Warn (but don't fail) if no languages were seeded — the directory exists but
          # none of the expected language files were present.
          if [ "$num_attempted" -eq 0 ]; then
            echo "Warning: No translations were seeded for application ${{ matrix.application.appName }}. Check that translation files exist at the expected path."
          fi

          if [ "$num_failures" -ne 0 ]; then
            echo "One or more languages for application ${{ matrix.application.appName }} failed to be seeded. Failing job."
            exit 1
          fi
