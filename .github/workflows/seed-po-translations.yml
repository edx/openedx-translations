#This workflow seeds translations for Python applications, storing existing translations in ai-translations.
# This one-time action helps us avoid re-translating strings that have already been translated.

name: Seed Python Translations

on:
  workflow_dispatch:
    inputs:
      application_name:
        description: 'Python application/repository to seed translations for. Leave blank to run all.'
        required: false
        type: string
      translation_language:
        description: 'Language code in edX format (e.g. es-419 or pt-PT). Leave blank to run all.'
        required: false
        type: string
  on:
  pull_request:
    branches: [main]

jobs:
  setup:
    uses: ./.github/workflows/_translate-setup.yml
    with:
      config_key: pythonApplications
      application_name: ${{ inputs.application_name || '' }}
      translation_language: ${{ inputs.translation_language || '' }}

  validate:
    uses: ./.github/workflows/_translate-validate-env.yml
    with:
      fetch_translations_url: ${{ vars.AI_TRANSLATIONS_SEED_PO_TRANSLATIONS_URL }}
      fetch_translations_url_name: AI_TRANSLATIONS_SEED_PO_TRANSLATIONS_URL
      lms_access_token_url: ${{ vars.LMS_ACCESS_TOKEN_URL }}
    secrets: inherit

  # Seeds regular Python applications

  seed-python-po-translations:
    if: ${{ fromJson(needs.setup.outputs.has_applications) == true }}
    runs-on: ubuntu-latest
    needs: [setup, validate]
    strategy:
      matrix:
        application: ${{ fromJson(needs.setup.outputs.applications) }}
      fail-fast: false
      max-parallel: 3

    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - name: Seed Python PO translations for ${{ matrix.application.appName }}
        env:
          LMS_ACCESS_TOKEN_URL: ${{ vars.LMS_ACCESS_TOKEN_URL }}
          EDX_TRANSLATIONS_PROD_CLIENT_ID: ${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_ID }}
          EDX_TRANSLATIONS_PROD_CLIENT_SECRET: ${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_SECRET }}

        run: |
          . .github/scripts/fetch_jwt.sh

          translation_languages='${{ needs.setup.outputs.translation_languages }}'
          app_dir="translations/${{ matrix.application.appName }}"
          
          if [ ! -d "$app_dir" ]; then
            echo "Application directory does not exist: $app_dir"
            exit 0
          fi

          locale_base=$(find "$app_dir" -type d -path "*/conf/locale" | head -1)

          if [ -z "$locale_base" ]; then
            echo "No conf/locale directory found under $app_dir. Skipping."
            exit 0
          fi

          echo "Found locale base: $locale_base"

          num_failures=0
          num_attempted=0

          while IFS= read -r lang; do

            fetch_jwt || exit 1

            edxLang=$(echo "$lang" | jq -r '.edxLang')
            repoLang=$(echo "$lang" | jq -r '.repoLang')

            po_dir="${locale_base}/${repoLang}/LC_MESSAGES"

            if [ ! -d "$po_dir" ]; then
              echo "PO directory does not exist: $po_dir. Skipping."
              continue
            fi

            for po_file in "$po_dir"/*.po; do

              if [ ! -f "$po_file" ]; then
                continue
              fi

              echo "Processing file $po_file"

              num_attempted=$((num_attempted+1))

              > /tmp/seed_po_response.txt

              curl_exit_code=0

              status_code=$(curl -sS \
                --connect-timeout 10 \
                --max-time 180 \
                -w "%{http_code}" \
                -o /tmp/seed_po_response.txt \
                -X POST "${{ vars.AI_TRANSLATIONS_SEED_PO_TRANSLATIONS_URL }}" \
                -F "application_name=${{ matrix.application.appName }}" \
                -F "translation_language=$edxLang" \
                -F "source_language=en" \
                -F "translation_file=@$po_file" \
                -H "Authorization: JWT ${JWT_TOKEN}") || curl_exit_code=$?

              if [ "$curl_exit_code" -ne 0 ]; then
                cat /tmp/seed_po_response.txt
                num_failures=$((num_failures+1))
                continue
              fi

              if [ "$status_code" -eq 200 ]; then
                echo "Successfully seeded $po_file"
              else
                echo "Failed seeding $po_file with status $status_code"
                cat /tmp/seed_po_response.txt
                num_failures=$((num_failures+1))
              fi

              echo ""
            done

          done < <(echo "$translation_languages" | jq -c '.[]')

          if [ "$num_attempted" -eq 0 ]; then
            echo "Warning: No Python PO translations were seeded."
          fi

          if [ "$num_failures" -ne 0 ]; then
            echo "One or more Python PO translations failed."
            exit 1
          fi

  # Seeds Python repos with subpackages

  seed-python-po-repos-with-subpackages:
    if: ${{ fromJson(needs.setup.outputs.has_repos_with_subpackages) == true }}

    runs-on: ubuntu-latest

    needs: [setup, validate]

    strategy:
      matrix:
        repo_config: ${{ fromJson(needs.setup.outputs.repos_with_subpackages) }}

      fail-fast: false
      max-parallel: 3

    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - name: Seed Python PO translations for subpackages
        env:
          LMS_ACCESS_TOKEN_URL: ${{ vars.LMS_ACCESS_TOKEN_URL }}
          EDX_TRANSLATIONS_PROD_CLIENT_ID: ${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_ID }}
          EDX_TRANSLATIONS_PROD_CLIENT_SECRET: ${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_SECRET }}

        run: |
          . .github/scripts/fetch_jwt.sh

          translation_languages='${{ needs.setup.outputs.translation_languages }}'
          packages='${{ toJSON(matrix.repo_config.packages) }}'

          num_failures=0
          num_attempted=0

          for package in $(echo "$packages" | jq -r '.[]'); do

            echo "Processing package $package"

            app_dir="translations/${{ matrix.repo_config.repo }}/${package}"

            if [ ! -d "$app_dir" ]; then
              echo "Package directory does not exist: $app_dir"
              continue
            fi

            # Dynamically locate conf/locale directory
            locale_base=$(find "$app_dir" -type d -path "*/conf/locale" | head -1)

            if [ -z "$locale_base" ]; then
              echo "No conf/locale directory found under $app_dir. Skipping package."
              continue
            fi

            echo "Found locale base: $locale_base"

            while IFS= read -r lang; do

              fetch_jwt || exit 1

              edxLang=$(echo "$lang" | jq -r '.edxLang')
              repoLang=$(echo "$lang" | jq -r '.repoLang')

              po_dir="${locale_base}/${repoLang}/LC_MESSAGES"

              if [ ! -d "$po_dir" ]; then
                echo "PO directory does not exist: $po_dir"
                continue
              fi

              for po_file in "$po_dir"/*.po; do

                [ -f "$po_file" ] || continue

                echo "Processing file $po_file"

                num_attempted=$((num_attempted+1))

                > /tmp/seed_po_response.txt

                curl_exit_code=0

                status_code=$(curl -sS \
                  --connect-timeout 10 \
                  --max-time 180 \
                  -w "%{http_code}" \
                  -o /tmp/seed_po_response.txt \
                  -X POST "${{ vars.AI_TRANSLATIONS_SEED_PO_TRANSLATIONS_URL }}" \
                  -F "application_name=${{ matrix.repo_config.repo }}/${package}" \
                  -F "translation_language=$edxLang" \
                  -F "source_language=en" \
                  -F "translation_file=@$po_file" \
                  -H "Authorization: JWT ${JWT_TOKEN}") || curl_exit_code=$?

                if [ "$curl_exit_code" -ne 0 ]; then
                  cat /tmp/seed_po_response.txt
                  num_failures=$((num_failures+1))
                  continue
                fi

                if [ "$status_code" -ne 200 ]; then
                  cat /tmp/seed_po_response.txt
                  num_failures=$((num_failures+1))
                fi

              done

            done < <(echo "$translation_languages" | jq -c '.[]')

          done

          if [ "$num_attempted" -eq 0 ]; then
            echo "Warning: No Python PO translations were seeded."
          fi

          if [ "$num_failures" -ne 0 ]; then
            echo "One or more Python PO translations failed."
            exit 1
          fi