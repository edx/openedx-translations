#This workflow seeds translations for Python applications, storing existing translations in ai-translations.
# This one-time action helps us avoid re-translating strings that have already been translated.

name: Seed Python Translations

on:
  workflow_dispatch:
    inputs:
      application_name:
        description: 'Python application/repository to seed translations for. Leave blank to run all.'
        required: false
        type: string

      translation_language:
      
        description: 'Language code in edX format (e.g. es-419 or pt-PT). Leave blank to run all.'
        required: false
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest

    outputs:
      has_python_applications: ${{ steps.generate_repo_matrix.outputs.has_python_applications }}
      python_applications: ${{ steps.generate_repo_matrix.outputs.python_applications }}
      has_python_repos_with_subpackages: ${{ steps.generate_repo_matrix.outputs.has_python_repos_with_subpackages }}
      python_repos_with_subpackages: ${{ steps.generate_repo_matrix.outputs.python_repos_with_subpackages }}
      translation_languages: ${{ steps.generate_repo_matrix.outputs.translation_languages }}

    steps:

      - uses: actions/checkout@v5

      - uses: actions/github-script@v7
        id: generate_repo_matrix
        with:
          script: |
            const fs = require('fs');

            const {
              pythonApplications: allPythonApps,
              languages,
            } = JSON.parse(
              fs.readFileSync('.github/translations-config.json', 'utf8')
            );

            const languageMap = languages.reduce((acc, lang) => {
              acc[lang.edxLang] = lang;
              return acc;
            }, {});

            const appInput = ${{ toJSON(github.event.inputs.application_name) }} || '';
            const languageInput = ${{ toJSON(github.event.inputs.translation_language) }} || '';

            const selectedApp = appInput;
            const selectedLanguage = languageInput;

            if (
              selectedApp !== '' &&
              !Object.keys(allPythonApps).includes(selectedApp)
            ) {
              core.setFailed(`Selected application "${selectedApp}" is not valid.`);
              throw new Error(`Selected application "${selectedApp}" is not valid.`);
            }

            if (
              selectedLanguage !== '' &&
              !Object.keys(languageMap).includes(selectedLanguage)
            ) {
              core.setFailed(`Selected language "${selectedLanguage}" is not valid.`);
              throw new Error(`Selected language "${selectedLanguage}" is not valid.`);
            }

            // Regular Python repos
            const pythonRepos = Object.entries(allPythonApps)
              .filter(([, config]) => !config.subpackages);

            const pythonApplications = selectedApp === ''
              ? pythonRepos.map(([appName, config]) => ({
                  appName,
                  ...config,
                }))
              : pythonRepos
                  .filter(([appName]) => appName === selectedApp)
                  .map(([appName, config]) => ({
                    appName,
                    ...config,
                  }));

            // Python repos with subpackages
            const pythonSubpackageRepos = Object.entries(allPythonApps)
              .filter(([, config]) => config.subpackages);

            const pythonReposWithSubpackages = selectedApp === ''
              ? pythonSubpackageRepos.map(([repo, config]) => ({
                  repo,
                  owner: config.owner ?? 'edx',
                  packages: config.subpackages,
                }))
              : pythonSubpackageRepos
                  .filter(([repo]) => repo === selectedApp)
                  .map(([repo, config]) => ({
                    repo,
                    owner: config.owner ?? 'edx',
                    packages: config.subpackages,
                  }));

            const translationLanguages =
              selectedLanguage === ''
                ? Object.values(languageMap)
                : [languageMap[selectedLanguage]];

            core.setOutput(
              'has_python_applications',
              pythonApplications.length > 0
            );

            core.setOutput(
              'python_applications',
              pythonApplications
            );

            core.setOutput(
              'has_python_repos_with_subpackages',
              pythonReposWithSubpackages.length > 0
            );

            core.setOutput(
              'python_repos_with_subpackages',
              pythonReposWithSubpackages
            );

            core.setOutput(
              'translation_languages',
              translationLanguages
            );

  # Seeds regular Python applications

  seed-python-po-translations:
    if: ${{ fromJson(needs.setup.outputs.has_python_applications) == true }}

    runs-on: ubuntu-latest

    needs: [setup]

    strategy:
      matrix:
        application: ${{ fromJson(needs.setup.outputs.python_applications) }}

      fail-fast: false
      max-parallel: 3

    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - name: Validate required environment variables
        run: |
          missing=0

          if [ -z "${{ vars.LMS_ACCESS_TOKEN_URL }}" ]; then
            echo "Required variable LMS_ACCESS_TOKEN_URL is not set."
            missing=$((missing+1))
          fi

          if [ -z "${{ vars.AI_TRANSLATIONS_SEED_PO_TRANSLATIONS_URL }}" ]; then
            echo "Required variable AI_TRANSLATIONS_SEED_PO_TRANSLATIONS_URL is not set."
            missing=$((missing+1))
          fi

          echo "::add-mask::${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_ID }}"
          echo "::add-mask::${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_SECRET }}"

          if [ -z "${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_ID }}" ]; then
            echo "Required secret EDX_TRANSLATIONS_PROD_CLIENT_ID is not set."
            missing=$((missing+1))
          fi

          if [ -z "${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_SECRET }}" ]; then
            echo "Required secret EDX_TRANSLATIONS_PROD_CLIENT_SECRET is not set."
            missing=$((missing+1))
          fi

          if [ "$missing" -ne 0 ]; then
            echo "Missing required variables or secrets."
            exit 1
          fi

      - name: Seed Python PO translations for ${{ matrix.application.appName }}
        env:
          LMS_ACCESS_TOKEN_URL: ${{ vars.LMS_ACCESS_TOKEN_URL }}
          EDX_TRANSLATIONS_PROD_CLIENT_ID: ${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_ID }}
          EDX_TRANSLATIONS_PROD_CLIENT_SECRET: ${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_SECRET }}

        run: |
          . .github/scripts/fetch_jwt.sh

          translation_languages='${{ needs.setup.outputs.translation_languages }}'

          app_dir="translations/${{ matrix.application.appName }}"

          if [ ! -d "$app_dir" ]; then
            echo "Application directory does not exist: $app_dir"
            exit 0
          fi

          locale_base=$(find "$app_dir" -type d -path "*/conf/locale" | head -1)

          if [ -z "$locale_base" ]; then
            echo "No conf/locale directory found under $app_dir. Skipping."
            exit 0
          fi

          echo "Found locale base: $locale_base"

          num_failures=0
          num_attempted=0

          while IFS= read -r lang; do

            fetch_jwt || exit 1

            edxLang=$(echo "$lang" | jq -r '.edxLang')
            repoLang=$(echo "$lang" | jq -r '.repoLang')

            po_dir="${locale_base}/${repoLang}/LC_MESSAGES"

            if [ ! -d "$po_dir" ]; then
              echo "PO directory does not exist: $po_dir"
              continue
            fi

            for po_file in "$po_dir"/*.po; do

              if [ ! -f "$po_file" ]; then
                continue
              fi

              echo "Processing file $po_file"

              num_attempted=$((num_attempted+1))

              > /tmp/seed_po_response.txt

              curl_exit_code=0

              status_code=$(curl -sS \
                --connect-timeout 10 \
                --max-time 180 \
                -w "%{http_code}" \
                -o /tmp/seed_po_response.txt \
                -X POST "${{ vars.AI_TRANSLATIONS_SEED_PO_TRANSLATIONS_URL }}" \
                -F "application_name=${{ matrix.application.appName }}" \
                -F "translation_language=$edxLang" \
                -F "source_language=en" \
                -F "translation_file=@$po_file" \
                -H "Authorization: JWT ${JWT_TOKEN}") || curl_exit_code=$?

              if [ "$curl_exit_code" -ne 0 ]; then
                cat /tmp/seed_po_response.txt
                num_failures=$((num_failures+1))
                continue
              fi

              if [ "$status_code" -eq 200 ]; then
                echo "Successfully seeded $po_file"
              else
                echo "Failed seeding $po_file with status $status_code"
                cat /tmp/seed_po_response.txt
                num_failures=$((num_failures+1))
              fi

              echo ""
            done

            if [ "$status_code" -ne 200 ]; then
              echo "Curl request failed for $po_file with status code $status_code"
              cat /tmp/seed_po_response.txt
              num_failures=$((num_failures+1))
            fi

          done

          done < <(echo "$translation_languages" | jq -c '.[]')

          if [ "$num_attempted" -eq 0 ]; then
            echo "Warning: No Python PO translations were seeded."
          fi

          if [ "$num_failures" -ne 0 ]; then
            echo "One or more Python PO translations failed."
            exit 1
          fi

  # Seeds Python repos with subpackages

  seed-python-po-repos-with-subpackages:
    if: ${{ fromJson(needs.setup.outputs.has_python_repos_with_subpackages) == true }}

    runs-on: ubuntu-latest

    needs: [setup]

    strategy:
      matrix:
        repo_config: ${{ fromJson(needs.setup.outputs.python_repos_with_subpackages) }}

      fail-fast: false
      max-parallel: 3

    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      # Reuse same validation logic
      - name: Validate required environment variables
        run: |
          missing=0

          if [ -z "${{ vars.LMS_ACCESS_TOKEN_URL }}" ]; then
            echo "Required variable LMS_ACCESS_TOKEN_URL is not set."
            missing=$((missing+1))
          fi

          if [ -z "${{ vars.AI_TRANSLATIONS_SEED_PO_TRANSLATIONS_URL }}" ]; then
            echo "Required variable AI_TRANSLATIONS_SEED_PO_TRANSLATIONS_URL is not set."
            missing=$((missing+1))
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Seed Python PO translations for subpackages
        env:
          LMS_ACCESS_TOKEN_URL: ${{ vars.LMS_ACCESS_TOKEN_URL }}
          EDX_TRANSLATIONS_PROD_CLIENT_ID: ${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_ID }}
          EDX_TRANSLATIONS_PROD_CLIENT_SECRET: ${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_SECRET }}

        run: |
          . .github/scripts/fetch_jwt.sh

          translation_languages='${{ needs.setup.outputs.translation_languages }}'
          packages='${{ toJSON(matrix.repo_config.packages) }}'

          num_failures=0
          num_attempted=0

          for package in $(echo "$packages" | jq -r '.[]'); do

            echo "Processing package $package"

            app_dir="translations/${{ matrix.repo_config.repo }}/${package}"

            if [ ! -d "$app_dir" ]; then
              echo "Package directory does not exist: $app_dir"
              continue
            fi

            # Dynamically locate conf/locale directory
            locale_base=$(find "$app_dir" -type d -path "*/conf/locale" | head -1)

            if [ -z "$locale_base" ]; then
              echo "No conf/locale directory found under $app_dir. Skipping package."
              continue
            fi

            echo "Found locale base: $locale_base"

            while IFS= read -r lang; do

              fetch_jwt || exit 1

              edxLang=$(echo "$lang" | jq -r '.edxLang')
              repoLang=$(echo "$lang" | jq -r '.repoLang')

              po_dir="${locale_base}/${repoLang}/LC_MESSAGES"

              if [ ! -d "$po_dir" ]; then
                echo "PO directory does not exist: $po_dir"
                continue
              fi

              for po_file in "$po_dir"/*.po; do

                [ -f "$po_file" ] || continue

                echo "Processing file $po_file"

                num_attempted=$((num_attempted+1))

                > /tmp/seed_po_response.txt

                curl_exit_code=0

                status_code=$(curl -sS \
                  --connect-timeout 10 \
                  --max-time 180 \
                  -w "%{http_code}" \
                  -o /tmp/seed_po_response.txt \
                  -X POST "${{ vars.AI_TRANSLATIONS_SEED_PO_TRANSLATIONS_URL }}" \
                  -F "application_name=${{ matrix.repo_config.repo }}/${package}" \
                  -F "translation_language=$edxLang" \
                  -F "source_language=en" \
                  -F "translation_file=@$po_file" \
                  -H "Authorization: JWT ${JWT_TOKEN}") || curl_exit_code=$?

                if [ "$curl_exit_code" -ne 0 ]; then
                  cat /tmp/seed_po_response.txt
                  num_failures=$((num_failures+1))
                  continue
                fi

                if [ "$status_code" -ne 200 ]; then
                  cat /tmp/seed_po_response.txt
                  num_failures=$((num_failures+1))
                fi

              done

            done < <(echo "$translation_languages" | jq -c '.[]')

          done

          if [ "$num_attempted" -eq 0 ]; then
            echo "Warning: No Python PO translations were seeded."
          fi

          if [ "$num_failures" -ne 0 ]; then
            echo "One or more Python PO translations failed."
            exit 1
          fi