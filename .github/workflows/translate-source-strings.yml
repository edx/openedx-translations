# This workflow fetches translations for JavaScript applications by calling the AI translations
# translate endpoint for each application and language code combination, using existing source string files.
# If successful, it commits the translated output and opens a pull request. In a select set of conditions,
# it auto-merges the pull request.

name: Translate source strings

on:
  workflow_dispatch:
    inputs:
      application_name:
        description: 'JavaScript application to fetch translations for, corresponding to a repository name under the translations directory. Leave blank to run all.'
        required: false
        type: string
      translation_language:
        description: 'Language code to fetch translations for in edX translations format (i.e. IETF BCP 47 format), typically {language-code}{-region-code (optional)} (e.g. es-419 or pt-PT). This is case insensitive. Leave blank to run all.'
        required: false
        type: string

env:
  # Maximum number of source string keys to send in a single API request.
  # Larger files are split into chunks of this size to avoid gateway timeouts.
  # Can be overridden by setting the TRANSLATION_CHUNK_SIZE repository variable.
  TRANSLATION_CHUNK_SIZE: ${{ vars.TRANSLATION_CHUNK_SIZE || 500 }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      has_javascript_applications: ${{ steps.generate_repo_matrix.outputs.has_javascript_applications }}
      has_javascript_repos_with_subpackages: ${{ steps.generate_repo_matrix.outputs.has_javascript_repos_with_subpackages }}
      javascript_applications: ${{ steps.generate_repo_matrix.outputs.javascript_applications }}
      javascript_repos_with_subpackages: ${{ steps.generate_repo_matrix.outputs.javascript_repos_with_subpackages }}
      translation_languages: ${{ steps.generate_repo_matrix.outputs.translation_languages }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/github-script@v7
        id: generate_repo_matrix
        with:
          script: |
            const fs = require('fs');
            const { javascriptApplications: allJavascriptApps, languages } = JSON.parse(
              fs.readFileSync('.github/translations-config.json', 'utf8')
            );

            // In order to efficiently query for details about a selected language, we maintain a mapping from edX language codes
            // to the object that describes the language.
            const languageMap = languages.reduce((acc, lang) => {
              acc[lang.edxLang] = lang;
              return acc;
            }, {});

            // Need to use a workaround until https://github.com/actions/toolkit/issues/1576 is fixed
            // const appInput = core.getInput('application_name');
            // const languageInput = core.getInput('translation_language');

            const appInput = ${{ toJSON(github.event.inputs.application_name) }} || '';
            const languageInput = ${{ toJSON(github.event.inputs.translation_language) }} || '';
            const selectedApp = appInput ? appInput.toLowerCase() : '';
            const selectedLanguage = languageInput ? languageInput.toLowerCase() : '';

            if (selectedApp !== '' && !Object.keys(allJavascriptApps).includes(selectedApp)) {
              core.setFailed(`Selected application "${selectedApp}" is not a valid option.`);
              throw new Error(`Selected application "${selectedApp}" is not a valid option.`);
            }
            if (selectedLanguage !== '' && !Object.keys(languageMap).includes(selectedLanguage)) {
              core.setFailed(`Selected language "${selectedLanguage}" is not a valid option.`);
              throw new Error(`Selected language "${selectedLanguage}" is not a valid option.`);
            }

            const javascriptRepos = Object.entries(allJavascriptApps).filter(([, config]) => !config.subpackages);
            const javascriptSubpackageRepos = Object.entries(allJavascriptApps).filter(([, config]) => config.subpackages);

            const javascriptApplications = selectedApp === ''
              ? javascriptRepos.map(([appName, config]) => ({ appName, ...config }))
              : javascriptRepos.filter(([appName]) => appName === selectedApp).map(([appName, config]) => ({ appName, ...config }));

            const javascriptReposWithSubpackages = selectedApp === ''
              ? javascriptSubpackageRepos.map(([repo, config]) => ({ repo, owner: config.owner ?? 'edx', packages: config.subpackages }))
              : javascriptSubpackageRepos.filter(([repo]) => repo === selectedApp).map(([repo, config]) => ({ repo, owner: config.owner ?? 'edx', packages: config.subpackages }));

            const translationLanguages = selectedLanguage === '' ? Object.values(languageMap) : [languageMap[selectedLanguage]];

            core.setOutput('has_javascript_applications', javascriptApplications.length > 0);
            core.setOutput('has_javascript_repos_with_subpackages', javascriptReposWithSubpackages.length > 0);
            core.setOutput('javascript_applications', javascriptApplications);
            core.setOutput('javascript_repos_with_subpackages', javascriptReposWithSubpackages);
            core.setOutput('translation_languages', translationLanguages);

  setup-branch:
    runs-on: ubuntu-latest
    needs: [setup]
    outputs:
      branch: ${{ steps.dynamic_branch.outputs.branch }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Dynamically set branch name
        id: dynamic_branch
        run: echo "branch=automated/translate-source-strings-$(date +'%Y%m%dT%H%M%S')" >> $GITHUB_OUTPUT

      - name: Clone ${{ github.repository }}
        uses: actions/checkout@v5

      # Note that when using a workflow_dispatch, this step will create a branch off the specified ref, which may not be the default branch.
      # This is useful for testing changes to the workflow during development. However, it will generate a branch with the changes on the
      # specified branch and any generated translations files.
      # The merge step prevents auto-merge in this case.
      - name: Create and push branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git checkout -b ${{ steps.dynamic_branch.outputs.branch }}
          git push --set-upstream origin ${{ steps.dynamic_branch.outputs.branch }}

  translate:
    if: ${{ fromJson(needs.setup.outputs.has_javascript_applications) == true }}
    needs: [setup, setup-branch]
    runs-on: ubuntu-latest
    strategy:
      # using max-parallel to avoid git push/pull issues when running in parallel
      max-parallel: 1
      matrix:
        application: ${{ fromJson(needs.setup.outputs.javascript_applications) }}
      fail-fast: false
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Clone ${{ github.repository }}
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.setup-branch.outputs.branch }}

      - name: Configure git identity
        run: |
          git config --global user.name "edx-translations-app"
          git config --global user.email "edx-translations-app@users.noreply.github.com"

      - name: Validate required environment variables
        run: |
          missing=0

          if [ -z "${{ vars.LMS_ACCESS_TOKEN_URL }}" ]; then
            echo "Required variable LMS_ACCESS_TOKEN_URL is not set."
            missing=$((missing+1))
          fi
          if [ -z "${{ vars.AI_TRANSLATIONS_FETCH_TRANSLATIONS_URL }}" ]; then
            echo "Required variable AI_TRANSLATIONS_FETCH_TRANSLATIONS_URL is not set."
            missing=$((missing+1))
          fi

          # Mask the client ID and secret to prevent it from being logged
          echo "::add-mask::${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_ID }}"
          echo "::add-mask::${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_SECRET }}"

          # Validate that the client ID is defined
          if [ -z "${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_ID }}" ]; then
            echo "Required secret EDX_TRANSLATIONS_PROD_CLIENT_ID is not set."
            missing=$((missing+1))
          fi

          # Validate that the client secret is defined
          if [ -z "${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_SECRET }}" ]; then
            echo "Required secret EDX_TRANSLATIONS_PROD_CLIENT_SECRET is not set."
            missing=$((missing+1))
          fi

          if [ "$missing" -ne 0 ]; then
            echo "One or more required variables or secrets are missing. Please configure them in the repository settings under Secrets and variables."
            exit 1
          fi

      - name: Translate source strings for ${{ matrix.application.appName }}
        env:
          LMS_ACCESS_TOKEN_URL: ${{ vars.LMS_ACCESS_TOKEN_URL }}
          EDX_TRANSLATIONS_PROD_CLIENT_ID: ${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_ID }}
          EDX_TRANSLATIONS_PROD_CLIENT_SECRET: ${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_SECRET }}
        run: |
          . .github/scripts/fetch_jwt.sh

          num_failures=0

          # Get list of languages, output path, and source strings path
          translation_languages='${{ needs.setup.outputs.translation_languages }}'
          i18n_path="${{ matrix.application.pathOverride || 'src/i18n' }}"
          source_strings_file_path="translations/${{ matrix.application.appName }}/${i18n_path}/transifex_input.json"

          # Validate that the source strings file exists. If not, exit early.
          if [ ! -f "$source_strings_file_path" ]; then
            echo "::warning::Source strings file does not exist: $source_strings_file_path. Skipping — application directory may not yet be seeded."
            exit 0
          fi

          # Validate that the source strings file is a non-empty JSON object.
          if ! jq -e 'type == "object"' "$source_strings_file_path" > /dev/null 2>&1; then
            echo "::warning::Source strings file is malformed or not a JSON object: $source_strings_file_path. Skipping."
            exit 0
          fi
          key_count=$(jq 'length' "$source_strings_file_path")
          if [ "$key_count" -eq 0 ]; then
            echo "::warning::Source strings file is empty for ${{ matrix.application.appName }}. Skipping."
            exit 0
          fi

          # Validate chunk size is a positive integer; fall back to 500 if unset or invalid.
          if [[ "$TRANSLATION_CHUNK_SIZE" =~ ^[1-9][0-9]*$ ]]; then
            chunk_size="$TRANSLATION_CHUNK_SIZE"
          else
            echo "::warning::TRANSLATION_CHUNK_SIZE ('$TRANSLATION_CHUNK_SIZE') is not a positive integer. Falling back to 500."
            chunk_size=500
          fi

          # Determine chunk count. This lets us split large source files into chunks to avoid gateway timeouts.
          # Each chunk is translated independently and responses are merged.
          num_chunks=$(( (key_count + chunk_size - 1) / chunk_size ))

          # Iterate through languages to translate.
          # Use read to avoid word-splitting issues if any language value contains whitespace.
          while IFS= read -r lang; do
            # Re-fetch JWT per language to prevent token expiry on long-running jobs.
            fetch_jwt || exit 1

            edxLang=$(echo "$lang" | jq -r '.edxLang')
            repoLang=$(echo "$lang" | jq -r '.repoLang')

            echo "Processing language $edxLang for application ${{ matrix.application.appName }} ($key_count keys, in $num_chunks chunk(s))."

            chunk_failed=0
            chunk_504=0
            chunk_response_files=()

            # Iterate over each chunk
            for ((chunk_idx=0; chunk_idx<num_chunks; chunk_idx++)); do

              # Create a temp file to store the translated response(s)
              chunk_response="/tmp/ai_translate_response_${edxLang}_${chunk_idx}.json"
              chunk_response_files+=("$chunk_response")

              # For large files, break into chunks and translate each separately
              if [ "$num_chunks" -gt 1 ]; then
                echo "Processing chunk $((chunk_idx + 1)) of $num_chunks for language $edxLang."
                start=$((chunk_idx * chunk_size))
                chunk_source="/tmp/ai_translate_chunk_${edxLang}_${chunk_idx}.json"
                if ! jq "to_entries | .[$start:$((start + chunk_size))] | from_entries" "$source_strings_file_path" > "$chunk_source"; then
                  echo "::warning::Failed to create chunk $((chunk_idx + 1)) of $num_chunks for language $edxLang for application ${{ matrix.application.appName }}. Skipping."
                  chunk_failed=1
                  break
                fi

              # For small files, we can skip the chunking and just use the original source file.
              else
                chunk_source="$source_strings_file_path"
              fi

              # The fetch translations endpoint occasionally times out with a 504 Gateway Timeout error.
              # --retry-all-errors ensures curl retries on 504 responses (not just network errors).
              # Requests that still fail after all retries are soft-failed with a warning.
              curl_exit_code=0
              status_code=$(curl -sS --connect-timeout 10 --max-time 180 --retry 3 --retry-delay 60 --retry-all-errors \
                -w "%{http_code}" \
                -o "$chunk_response" \
                -X POST "${{ vars.AI_TRANSLATIONS_FETCH_TRANSLATIONS_URL }}" \
                -F "file=@$chunk_source" \
                -F "application_name=${{ matrix.application.appName }}" \
                -F "language=$edxLang" \
                -H "Authorization: JWT ${JWT_TOKEN}") || curl_exit_code=$?

              # On a chunk failure, early exit the chunk loop to avoid unnecessary API calls.
              if [ "$curl_exit_code" -ne 0 ]; then
                echo "::warning::Curl request failed for chunk $((chunk_idx + 1)) of $num_chunks, language $edxLang, application ${{ matrix.application.appName }} with exit code $curl_exit_code."
                [ -s "$chunk_response" ] && cat "$chunk_response"
                chunk_failed=1
                break
              fi

              if [ "$status_code" -eq 504 ]; then
                echo "::warning::API call timed out (504) for chunk $((chunk_idx + 1)) of $num_chunks, language $edxLang, application ${{ matrix.application.appName }} after retries. Skipping — will retry on next run."
                [ -s "$chunk_response" ] && cat "$chunk_response"
                chunk_504=1
                break
              fi

              if [ "$status_code" -ne 200 ]; then
                echo "::warning::API call failed for chunk $((chunk_idx + 1)) of $num_chunks, language $edxLang, application ${{ matrix.application.appName }} with status code $status_code."
                [ -s "$chunk_response" ] && cat "$chunk_response"
                chunk_failed=1
                break
              fi

              echo "Chunk $((chunk_idx + 1)) of $num_chunks succeeded for language $edxLang."
            done

            # Note chunk failures
            if [ "$chunk_failed" -eq 1 ]; then
              num_failures=$((num_failures+1))
              echo ""
              continue
            fi
            if [ "$chunk_504" -eq 1 ]; then
              echo ""
              continue
            fi

            # Validate that chunks are valid JSON
            all_valid=1
            for chunk_response in "${chunk_response_files[@]}"; do
              if ! jq empty "$chunk_response" 2>/dev/null; then
                echo "::warning::A response chunk for language $edxLang for application ${{ matrix.application.appName }} is not valid JSON. Skipping."
                all_valid=0
                break
              fi
            done
            if [ "$all_valid" -eq 0 ]; then
              num_failures=$((num_failures+1))
              echo ""
              continue
            fi

            echo "API call to fetch translations succeeded for language $edxLang for application ${{ matrix.application.appName }}."

            # Create output directory, if it doesn't exist
            output_file_path="translations/${{ matrix.application.appName }}/${i18n_path}/messages/${repoLang}.json"
            mkdir -p "$(dirname "$output_file_path")"

            # Pretty format the JSON; if multiple chunks, merge them first with jq -s 'add'.
            # Only write to the output file if jq succeeds to avoid overwriting with an empty file.
            if [ "${#chunk_response_files[@]}" -gt 1 ]; then
              jq -s 'add' "${chunk_response_files[@]}" > "${output_file_path}.tmp" \
                && mv "${output_file_path}.tmp" "$output_file_path" \
                || {
                  echo "::warning::Failed to merge and write translated strings for language $edxLang for application ${{ matrix.application.appName }}. Skipping."
                  rm -f "${output_file_path}.tmp"
                  num_failures=$((num_failures+1))
                  echo ""
                  continue
                }
            else
              jq . "${chunk_response_files[0]}" > "${output_file_path}.tmp" \
                && mv "${output_file_path}.tmp" "$output_file_path" \
                || {
                  echo "::warning::Failed to write translated strings for language $edxLang for application ${{ matrix.application.appName }} to $output_file_path. Skipping."
                  rm -f "${output_file_path}.tmp"
                  num_failures=$((num_failures+1))
                  echo ""
                  continue
                }
            fi

            git add "$output_file_path"
            echo ""
          done < <(echo "$translation_languages" | jq -c '.[]')

          # Check if there are any changes to commit. If so, commit and push.
          GIT_STATUS=$(git status "translations/${{ matrix.application.appName }}/${i18n_path}/messages" -s | wc -l)
          if [ "$GIT_STATUS" -gt 0 ]; then
            git commit -m "chore: add AI translated strings for ${{ matrix.application.appName }}"
            git push
          fi

          if [ "$num_failures" -ne 0 ]; then
            echo "One or more languages for application ${{ matrix.application.appName }} failed to be translated. Failing job."
            exit 1
          fi

  translate-js-repos-with-subpackages:
    if: ${{ !cancelled() && fromJson(needs.setup.outputs.has_javascript_repos_with_subpackages) == true }}
    needs: [setup, setup-branch, translate]
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        repo_config: ${{ fromJson(needs.setup.outputs.javascript_repos_with_subpackages) }}
      fail-fast: false
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Clone ${{ github.repository }}
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.setup-branch.outputs.branch }}

      - name: Configure git identity
        run: |
          git config --global user.name "edx-translations-app"
          git config --global user.email "edx-translations-app@users.noreply.github.com"

      - name: Validate required environment variables
        run: |
          missing=0

          if [ -z "${{ vars.LMS_ACCESS_TOKEN_URL }}" ]; then
            echo "Required variable LMS_ACCESS_TOKEN_URL is not set."
            missing=$((missing+1))
          fi
          if [ -z "${{ vars.AI_TRANSLATIONS_FETCH_TRANSLATIONS_URL }}" ]; then
            echo "Required variable AI_TRANSLATIONS_FETCH_TRANSLATIONS_URL is not set."
            missing=$((missing+1))
          fi

          echo "::add-mask::${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_ID }}"
          echo "::add-mask::${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_SECRET }}"

          if [ -z "${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_ID }}" ]; then
            echo "Required secret EDX_TRANSLATIONS_PROD_CLIENT_ID is not set."
            missing=$((missing+1))
          fi

          if [ -z "${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_SECRET }}" ]; then
            echo "Required secret EDX_TRANSLATIONS_PROD_CLIENT_SECRET is not set."
            missing=$((missing+1))
          fi

          if [ "$missing" -ne 0 ]; then
            echo "One or more required variables or secrets are missing. Please configure them in the repository settings under Secrets and variables."
            exit 1
          fi

      - name: Translate source strings for ${{ matrix.repo_config.repo }} subpackages
        env:
          LMS_ACCESS_TOKEN_URL: ${{ vars.LMS_ACCESS_TOKEN_URL }}
          EDX_TRANSLATIONS_PROD_CLIENT_ID: ${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_ID }}
          EDX_TRANSLATIONS_PROD_CLIENT_SECRET: ${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_SECRET }}
        run: |
          . .github/scripts/fetch_jwt.sh

          translation_languages='${{ needs.setup.outputs.translation_languages }}'
          packages='${{ toJSON(matrix.repo_config.packages) }}'

          num_failures=0

          for package in $(echo "$packages" | jq -r '.[]'); do
            echo "Processing package $package in ${{ matrix.repo_config.repo }}."

            i18n_dir="translations/${{ matrix.repo_config.repo }}/packages/${package}/src/i18n"
            source_strings_file_path="${i18n_dir}/transifex_input.json"

            if [ ! -f "$source_strings_file_path" ]; then
              echo "::warning::Source strings file does not exist: $source_strings_file_path. Skipping — package directory may not yet be seeded."
              echo ""
              continue
            fi

            for lang in $(echo "$translation_languages" | jq -c '.[]'); do
              # Re-fetch JWT per language to prevent token expiry on long-running jobs.
              fetch_jwt || exit 1

              edxLang=$(echo "$lang" | jq -r '.edxLang')
              repoLang=$(echo "$lang" | jq -r '.repoLang')

              echo "Processing language $edxLang for package $package."

              output_file_path="${i18n_dir}/messages/${repoLang}.json"
              response_file="/tmp/ai_translate_response_${package}_${edxLang}.json"

              curl_exit_code=0
              status_code=$(curl -sS --connect-timeout 10 --max-time 180 --retry 3 --retry-delay 60 --retry-all-errors \
                -w "%{http_code}" \
                -o "$response_file" \
                -X POST "${{ vars.AI_TRANSLATIONS_FETCH_TRANSLATIONS_URL }}" \
                -F "file=@$source_strings_file_path" \
                -F "application_name=${{ matrix.repo_config.repo }}/${package}" \
                -F "language=$edxLang" \
                -H "Authorization: JWT ${JWT_TOKEN}") || curl_exit_code=$?

              if [ "$curl_exit_code" -ne 0 ]; then
                echo "::warning::Curl request to fetch translations failed for language $edxLang for package $package with exit code $curl_exit_code."
                [ -s "$response_file" ] && cat "$response_file"
                num_failures=$((num_failures+1))
                continue
              fi

              if [ "$status_code" -eq 200 ]; then
                echo "API call to fetch translations succeeded for language $edxLang for package $package."
                if ! jq empty "$response_file" 2>/dev/null; then
                  echo "::warning::Response for language $edxLang for package $package is not valid JSON. Skipping."
                  num_failures=$((num_failures+1))
                  continue
                fi

                mkdir -p "$(dirname "$output_file_path")"

                jq . "$response_file" > "${output_file_path}.tmp" \
                  && mv "${output_file_path}.tmp" "$output_file_path" \
                  || {
                    echo "::warning::Failed to write translated strings for language $edxLang for package $package to $output_file_path. Skipping."
                    rm -f "${output_file_path}.tmp"
                    num_failures=$((num_failures+1))
                    continue
                  }

                git add "$output_file_path"
              elif [ "$status_code" -eq 504 ]; then
                echo "::warning::API call timed out (504) for language $edxLang for package $package after retries. Skipping — will retry on next run."
                [ -s "$response_file" ] && cat "$response_file"
              else
                echo "::warning::API call to fetch translations failed for language $edxLang for package $package with status code $status_code."
                [ -s "$response_file" ] && cat "$response_file"
                num_failures=$((num_failures+1))
              fi

              echo ""
            done
          done

          GIT_STATUS=$(git status "translations/${{ matrix.repo_config.repo }}/packages" -s | wc -l)
          if [ "$GIT_STATUS" -gt 0 ]; then
            git commit -m "chore: add AI translated strings for ${{ matrix.repo_config.repo }} subpackages"
            git push
          fi

          if [ "$num_failures" -ne 0 ]; then
            echo "One or more packages in ${{ matrix.repo_config.repo }} failed to be translated. Failing job."
            exit 1
          fi

  merge:
    runs-on: ubuntu-latest
    needs: [setup, setup-branch, translate, translate-js-repos-with-subpackages]
    # We want to run this job even if the translate job fails. This is because the translate job will fail when one or more translations fails, even
    # if some translations succeed. We want to merge in the successful translations.
    if: ${{ !cancelled() && needs.setup.result == 'success' && needs.setup-branch.result == 'success' }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Clone ${{ github.repository }}
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.setup-branch.outputs.branch }}
          fetch-depth: 0

      - name: Create pull request
        id: createPR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          COMMIT_COUNT=$(git rev-list HEAD ^origin/main | wc -l | tr -d ' ')
          echo "COMMIT_COUNT=$COMMIT_COUNT" >> $GITHUB_ENV

          if [ "$COMMIT_COUNT" -gt 0 ]; then
            PR_URL=$(gh pr create \
              --repo "$REPO" \
              --title "chore: add AI translated strings" \
              --body "This PR is auto-generated by [translate-source-strings](https://github.com/${REPO}/blob/main/.github/workflows/translate-source-strings.yml).")
            echo "PR_URL=$PR_URL" >> $GITHUB_ENV
            echo "PR_URL=$PR_URL"
          fi

      - name: Merge pull request
        id: mergePR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Do not automerge if any of the following are true.
        # 1. the job is not running on the main branch
        # 2. the job is not running as the result of a scheduled trigger (i.e. a cron)
        # 3. there are 0 commits
        if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'schedule' && env.COMMIT_COUNT > 0 }}
        run: gh pr merge ${{ env.PR_URL }} --merge --auto

      # Notify that branch did not merge and delete the branch now that it is unnecessary.
      - name: Notify of empty branch and delete branch
        if: ${{ steps.mergePR.outcome == 'skipped' }}
        run: |
          echo "The branch was not merged and was deleted because the workflow was not run on the main branch, was not scheduled (i.e. a cron), or the branch had 0 commits."
          git push origin -d ${{ needs.setup-branch.outputs.branch }}
