# This workflow seeds translations for JavaScript applications, storing existing translations in ai-translations.
# This one-time action helps us avoid re-translating strings that have already been translated.

name: Seed JSON Translations

on:
  workflow_dispatch:
    inputs:
      application_name:
        description: 'JS application/repository to seed translations for, case sensitive. Leave blank to run all.'
        required: false
        type: string
      translation_language:
        description: 'Language code in edX format (e.g. es-419 or pt-PT), case insensitive. Leave blank to run all.'
        required: false
        type: string

jobs:
  setup:
    uses: ./.github/workflows/_translate-setup.yml
    with:
      config_key: javascriptApplications
      application_name: ${{ inputs.application_name || '' }}
      translation_language: ${{ inputs.translation_language || '' }}

  validate:
    uses: ./.github/workflows/_translate-validate-env.yml
    with:
      fetch_translations_url: ${{ vars.AI_TRANSLATIONS_SEED_JSON_TRANSLATIONS_URL }}
      fetch_translations_url_name: AI_TRANSLATIONS_SEED_JSON_TRANSLATIONS_URL
      lms_access_token_url: ${{ vars.LMS_ACCESS_TOKEN_URL }}
    secrets: inherit

  # Seeds regular (non-monorepo) JavaScript apps.
  seed-js-translations:
    if: ${{ fromJson(needs.setup.outputs.has_applications) == true }}
    runs-on: ubuntu-latest
    needs: [setup, validate]
    strategy:
      matrix:
        application: ${{ fromJson(needs.setup.outputs.applications) }}
      fail-fast: false
      max-parallel: 3
    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - name: Seed translation languages for ${{ matrix.application.appName }}
        env:
          LMS_ACCESS_TOKEN_URL: ${{ vars.LMS_ACCESS_TOKEN_URL }}
          EDX_TRANSLATIONS_PROD_CLIENT_ID: ${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_ID }}
          EDX_TRANSLATIONS_PROD_CLIENT_SECRET: ${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_SECRET }}
        run: |
          . .github/scripts/fetch_jwt.sh

          translation_languages='${{ needs.setup.outputs.translation_languages }}'
          i18n_path="${{ matrix.application.pathOverride || 'src/i18n' }}"
          app_translations_dir="translations/${{ matrix.application.appName }}"

          # Skip the application entirely if its translations directory hasn't been
          # populated yet (e.g. a newly added app with no extracted strings).
          if [ ! -d "$app_translations_dir" ]; then
            echo "Translations directory does not exist: $app_translations_dir. Skipping application."
            exit 0
          fi

          num_failures=0
          num_attempted=0

          # Loop through selected languages
          while IFS= read -r lang; do
            # Re-fetch JWT per language to prevent token expiry on long-running jobs.
            fetch_jwt || exit 1

            edxLang=$(echo "$lang" | jq -r '.edxLang')
            repoLang=$(echo "$lang" | jq -r '.repoLang')

            echo "Processing language $edxLang for application ${{ matrix.application.appName }}."

            translations_file_path="translations/${{ matrix.application.appName }}/${i18n_path}/messages/${repoLang}.json"
            source_strings_file_path="translations/${{ matrix.application.appName }}/${i18n_path}/transifex_input.json"

            # Skip individual languages that haven't been translated yet; not every app
            # has a file for every supported language.
            if [ ! -f "$translations_file_path" ]; then
              echo "Translations file does not exist: $translations_file_path. Skipping."
              echo ""
              continue
            fi

            # Skip if the source strings file is missing; both files are required to seed.
            if [ ! -f "$source_strings_file_path" ]; then
              echo "Source strings file does not exist: $source_strings_file_path. Skipping."
              echo ""
              continue
            fi

            num_attempted=$((num_attempted+1))

            > /tmp/seed_translations_response.txt
            curl_exit_code=0
            status_code=$(curl -sS --connect-timeout 10 --max-time 180 \
              -w "%{http_code}" \
              -o /tmp/seed_translations_response.txt \
              -X POST "${{ vars.AI_TRANSLATIONS_SEED_JSON_TRANSLATIONS_URL }}" \
              -F "application_name=${{ matrix.application.appName }}" \
              -F "translation_language=$edxLang" \
              -F "translation_file=@$translations_file_path" \
              -F "source_file=@$source_strings_file_path" \
              -H "Authorization: JWT ${JWT_TOKEN}") || curl_exit_code=$?

            if [ "$curl_exit_code" -ne 0 ]; then
              echo "Curl request to seed translations failed for language $edxLang for application ${{ matrix.application.appName }} with exit code $curl_exit_code."
              cat /tmp/seed_translations_response.txt
              num_failures=$((num_failures+1))
              continue
            fi

            if [ "$status_code" -eq 200 ]; then
              echo "API call to seed translations succeeded for language $edxLang for application ${{ matrix.application.appName }} with status code $status_code."
            else
              echo "API call to seed translations failed for language $edxLang for application ${{ matrix.application.appName }} with status code $status_code."
              cat /tmp/seed_translations_response.txt
              num_failures=$((num_failures+1))
            fi

            echo ""
          done < <(echo "$translation_languages" | jq -c '.[]')

          # Warn (but don't fail) if no languages were seeded — the directory exists but
          # none of the expected language files were present.
          if [ "$num_attempted" -eq 0 ]; then
            echo "Warning: No translations were seeded for application ${{ matrix.application.appName }}. Check that translation files exist at the expected path."
          fi

          if [ "$num_failures" -ne 0 ]; then
            echo "One or more languages for application ${{ matrix.application.appName }} failed to be seeded. Failing job."
            exit 1
          fi

  # Seeds monorepos with subpackages (e.g. frontend-plugins); each subpackage is seeded independently.
  seed-js-repos-with-subpackages:
    if: ${{ fromJson(needs.setup.outputs.has_repos_with_subpackages) == true }}
    runs-on: ubuntu-latest
    needs: [setup, validate]
    strategy:
      matrix:
        repo_config: ${{ fromJson(needs.setup.outputs.repos_with_subpackages) }}
      fail-fast: false
      max-parallel: 3
    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - name: Seed translation languages for ${{ matrix.repo_config.repo }} subpackages
        env:
          LMS_ACCESS_TOKEN_URL: ${{ vars.LMS_ACCESS_TOKEN_URL }}
          EDX_TRANSLATIONS_PROD_CLIENT_ID: ${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_ID }}
          EDX_TRANSLATIONS_PROD_CLIENT_SECRET: ${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_SECRET }}
        run: |
          . .github/scripts/fetch_jwt.sh

          translation_languages='${{ needs.setup.outputs.translation_languages }}'
          packages='${{ toJSON(matrix.repo_config.packages) }}'

          num_failures=0
          num_attempted=0

          # Loop through each subpackage in the monorepo.
          for package in $(echo "$packages" | jq -r '.[]'); do
            echo "Processing package $package in ${{ matrix.repo_config.repo }}."

            i18n_dir="translations/${{ matrix.repo_config.repo }}/packages/${package}/src/i18n"
            source_strings_file_path="${i18n_dir}/transifex_input.json"

            # Skip packages whose source strings haven't been extracted yet.
            if [ ! -f "$source_strings_file_path" ]; then
              echo "Source strings file does not exist: $source_strings_file_path. Skipping package."
              echo ""
              continue
            fi

            # Loop through selected languages for this package.
            for lang in $(echo "$translation_languages" | jq -c '.[]'); do
              # Re-fetch JWT per language to prevent token expiry on long-running jobs.
              fetch_jwt || exit 1

              edxLang=$(echo "$lang" | jq -r '.edxLang')
              repoLang=$(echo "$lang" | jq -r '.repoLang')

              echo "Processing language $edxLang for package $package."

              translations_file_path="${i18n_dir}/messages/${repoLang}.json"

              # Skip individual languages that haven't been translated yet; not every package
              # has a file for every supported language.
              if [ ! -f "$translations_file_path" ]; then
                echo "Translations file does not exist: $translations_file_path. Skipping."
                echo ""
                continue
              fi

              num_attempted=$((num_attempted+1))

              > /tmp/seed_translations_response.txt
              curl_exit_code=0
              status_code=$(curl -sS --connect-timeout 10 --max-time 180 \
                -w "%{http_code}" \
                -o /tmp/seed_translations_response.txt \
                -X POST "${{ vars.AI_TRANSLATIONS_SEED_JSON_TRANSLATIONS_URL }}" \
                -F "application_name=${{ matrix.repo_config.repo }}/${package}" \
                -F "translation_language=$edxLang" \
                -F "translation_file=@$translations_file_path" \
                -F "source_file=@$source_strings_file_path" \
                -H "Authorization: JWT ${JWT_TOKEN}") || curl_exit_code=$?

              if [ "$curl_exit_code" -ne 0 ]; then
                echo "Curl request to seed translations failed for language $edxLang for package $package with exit code $curl_exit_code."
                cat /tmp/seed_translations_response.txt
                num_failures=$((num_failures+1))
                continue
              fi

              if [ "$status_code" -eq 200 ]; then
                echo "API call to seed translations succeeded for language $edxLang for package $package."
              else
                echo "API call to seed translations failed for language $edxLang for package $package with status code $status_code."
                cat /tmp/seed_translations_response.txt
                num_failures=$((num_failures+1))
              fi

              echo ""
            done
          done

          if [ "$num_attempted" -eq 0 ]; then
            echo "Warning: No translations were seeded for ${{ matrix.repo_config.repo }}. Check that translation files exist at the expected paths."
          fi

          if [ "$num_failures" -ne 0 ]; then
            echo "One or more packages in ${{ matrix.repo_config.repo }} failed to be seeded. Failing job."
            exit 1
          fi
