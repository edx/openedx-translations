# This workflow seeds translations for JavaScript applications, storing existing translations in ai-translations.
# This one-time action helps us avoid re-translating strings that have already been translated.

name: Seed translations

on:
  workflow_dispatch:
    inputs:
      application_name:
        description: 'Application to seed translations for, corresponding to a repository name under the translations directory. Leave blank to run all.'
        required: false
        type: string
      translation_language:
        description: 'Language code to seed translations for in edX translations format (i.e. IETF BCP 47 format), typically {language-code}{-region-code (optional)} (e.g. es-419 or pt-PT). This is case insensitive. Leave blank to run all.'
        required: false
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      has_javascript_applications: ${{ steps.generate_repo_matrix.outputs.has_javascript_applications }}
      has_javascript_repos_with_subpackages: ${{ steps.generate_repo_matrix.outputs.has_javascript_repos_with_subpackages }}
      javascript_applications: ${{ steps.generate_repo_matrix.outputs.javascript_applications }}
      javascript_repos_with_subpackages: ${{ steps.generate_repo_matrix.outputs.javascript_repos_with_subpackages }}
      translation_languages: ${{ steps.generate_repo_matrix.outputs.translation_languages }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/github-script@v7
        id: generate_repo_matrix
        with:
          script: |
            // Get repo & language config from translations-config.json.
            const fs = require('fs');
            const { javascriptApplications: allJavascriptApps, languages } = JSON.parse(
              fs.readFileSync('.github/translations-config.json', 'utf8')
            );

            // Map language codes to their repo path and edX format for easy lookup and validation.
            const languageMap = languages.reduce((acc, lang) => {
              acc[lang.edxLang] = lang;
              return acc;
            }, {});

            // Get apps & languages to seed from workflow inputs
            // Original method, replaced with workaround until https://github.com/actions/toolkit/issues/1576 is fixed.
            // const appInput = core.getInput('application_name');
            // const languageInput = core.getInput('translation_language');
            const appInput = ${{ toJSON(github.event.inputs.application_name) }} || '';
            const languageInput = ${{ toJSON(github.event.inputs.translation_language) }} || '';
            const selectedApp = appInput ? appInput.toLowerCase() : '';
            const selectedLanguage = languageInput ? languageInput.toLowerCase() : '';

            // Validate that app & language inputs are valid
            if (selectedApp !== '' && !Object.keys(allJavascriptApps).includes(selectedApp)) {
              core.setFailed(`Selected application "${selectedApp}" is not a valid option.`);
              throw new Error(`Selected application "${selectedApp}" is not a valid option.`);
            }
            if (selectedLanguage !== '' && !Object.keys(languageMap).includes(selectedLanguage)) {
              core.setFailed(`Selected language "${selectedLanguage}" is not a valid option.`);
              throw new Error(`Selected language "${selectedLanguage}" is not a valid option.`);
            }

            // Split out regular JS apps and monorepos (repos with subpackages), defaulting to all if unspecified.
            const javascriptRepos = Object.entries(allJavascriptApps).filter(([, config]) => !config.subpackages);
            const javascriptApplications = selectedApp === ''
              ? javascriptRepos.map(([appName, config]) => ({ appName, ...config }))
              : javascriptRepos.filter(([appName]) => appName === selectedApp).map(([appName, config]) => ({ appName, ...config }));

            const javascriptSubpackageRepos = Object.entries(allJavascriptApps).filter(([, config]) => config.subpackages);
            const javascriptReposWithSubpackages = selectedApp === ''
              ? javascriptSubpackageRepos.map(([repo, config]) => ({ repo, owner: config.owner ?? 'edx', packages: config.subpackages }))
              : javascriptSubpackageRepos.filter(([repo]) => repo === selectedApp).map(([repo, config]) => ({ repo, owner: config.owner ?? 'edx', packages: config.subpackages }));

            // Split out translation languages to seed, defaulting to all if none selected.
            const translationLanguages = selectedLanguage === '' ? Object.values(languageMap) : [languageMap[selectedLanguage]];

            // Produce validated output of applications and languages to seed.
            core.setOutput('has_javascript_applications', javascriptApplications.length > 0);
            core.setOutput('has_javascript_repos_with_subpackages', javascriptReposWithSubpackages.length > 0);
            core.setOutput('javascript_applications', javascriptApplications);
            core.setOutput('javascript_repos_with_subpackages', javascriptReposWithSubpackages);
            core.setOutput('translation_languages', translationLanguages);

  # Seeds regular (non-monorepo) JavaScript apps.
  seed-translations:
    if: ${{ fromJson(needs.setup.outputs.has_javascript_applications) == true }}
    runs-on: ubuntu-latest
    needs: [setup]
    strategy:
      matrix:
        application: ${{ fromJson(needs.setup.outputs.javascript_applications) }}
      fail-fast: false
      max-parallel: 3
    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - name: Validate required environment variables
        run: |
          missing=0

          if [ -z "${{ vars.LMS_ACCESS_TOKEN_URL }}" ]; then
            echo "Required variable LMS_ACCESS_TOKEN_URL is not set."
            missing=$((missing+1))
          fi
          if [ -z "${{ vars.AI_TRANSLATIONS_SEED_TRANSLATIONS_URL }}" ]; then
            echo "Required variable AI_TRANSLATIONS_SEED_TRANSLATIONS_URL is not set."
            missing=$((missing+1))
          fi

          # Mask the client ID and secret to prevent it from being logged
          echo "::add-mask::${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_ID }}"
          echo "::add-mask::${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_SECRET }}"

          # Validate that the client ID is defined
          if [ -z "${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_ID }}" ]; then
            echo "Required secret EDX_TRANSLATIONS_PROD_CLIENT_ID is not set."
            missing=$((missing+1))
          fi

          # Validate that the client secret is defined
          if [ -z "${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_SECRET }}" ]; then
            echo "Required secret EDX_TRANSLATIONS_PROD_CLIENT_SECRET is not set."
            missing=$((missing+1))
          fi

          if [ "$missing" -ne 0 ]; then
            echo "One or more required variables or secrets are missing. Please configure them in the repository settings under Secrets and variables."
            exit 1
          fi

      - name: Seed translation languages for ${{ matrix.application.appName }}
        env:
          LMS_ACCESS_TOKEN_URL: ${{ vars.LMS_ACCESS_TOKEN_URL }}
          EDX_TRANSLATIONS_PROD_CLIENT_ID: ${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_ID }}
          EDX_TRANSLATIONS_PROD_CLIENT_SECRET: ${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_SECRET }}
        run: |
          . .github/scripts/fetch_jwt.sh

          translation_languages='${{ needs.setup.outputs.translation_languages }}'
          i18n_path="${{ matrix.application.pathOverride || 'src/i18n' }}"
          app_translations_dir="translations/${{ matrix.application.appName }}"

          # Skip the application entirely if its translations directory hasn't been
          # populated yet (e.g. a newly added app with no extracted strings).
          if [ ! -d "$app_translations_dir" ]; then
            echo "Translations directory does not exist: $app_translations_dir. Skipping application."
            exit 0
          fi

          num_failures=0
          num_attempted=0

          # Loop through selected languages
          while IFS= read -r lang; do
            # Re-fetch JWT per language to prevent token expiry on long-running jobs.
            fetch_jwt || exit 1

            edxLang=$(echo "$lang" | jq -r '.edxLang')
            repoLang=$(echo "$lang" | jq -r '.repoLang')

            echo "Processing language $edxLang for application ${{ matrix.application.appName }}."

            translations_file_path="translations/${{ matrix.application.appName }}/${i18n_path}/messages/${repoLang}.json"
            source_strings_file_path="translations/${{ matrix.application.appName }}/${i18n_path}/transifex_input.json"

            # Skip individual languages that haven't been translated yet; not every app
            # has a file for every supported language.
            if [ ! -f "$translations_file_path" ]; then
              echo "Translations file does not exist: $translations_file_path. Skipping."
              echo ""
              continue
            fi

            # Skip if the source strings file is missing; both files are required to seed.
            if [ ! -f "$source_strings_file_path" ]; then
              echo "Source strings file does not exist: $source_strings_file_path. Skipping."
              echo ""
              continue
            fi

            num_attempted=$((num_attempted+1))

            > /tmp/seed_translations_response.txt
            curl_exit_code=0
            status_code=$(curl -sS --connect-timeout 10 --max-time 180 \
              -w "%{http_code}" \
              -o /tmp/seed_translations_response.txt \
              -X POST "${{ vars.AI_TRANSLATIONS_SEED_TRANSLATIONS_URL }}" \
              -F "application_name=${{ matrix.application.appName }}" \
              -F "translation_language=$edxLang" \
              -F "source_language=en" \
              -F "translation_file=@$translations_file_path" \
              -F "source_file=@$source_strings_file_path" \
              -H "Authorization: JWT ${JWT_TOKEN}") || curl_exit_code=$?

            if [ "$curl_exit_code" -ne 0 ]; then
              echo "Curl request to seed translations failed for language $edxLang for application ${{ matrix.application.appName }} with exit code $curl_exit_code."
              cat /tmp/seed_translations_response.txt
              num_failures=$((num_failures+1))
              continue
            fi

            if [ "$status_code" -eq 200 ]; then
              echo "API call to seed translations succeeded for language $edxLang for application ${{ matrix.application.appName }} with status code $status_code."
            else
              echo "API call to seed translations failed for language $edxLang for application ${{ matrix.application.appName }} with status code $status_code."
              cat /tmp/seed_translations_response.txt
              num_failures=$((num_failures+1))
            fi

            echo ""
          done < <(echo "$translation_languages" | jq -c '.[]')

          # Warn (but don't fail) if no languages were seeded — the directory exists but
          # none of the expected language files were present.
          if [ "$num_attempted" -eq 0 ]; then
            echo "Warning: No translations were seeded for application ${{ matrix.application.appName }}. Check that translation files exist at the expected path."
          fi

          if [ "$num_failures" -ne 0 ]; then
            echo "One or more languages for application ${{ matrix.application.appName }} failed to be seeded. Failing job."
            exit 1
          fi

  # Seeds monorepos with subpackages (e.g. frontend-plugins); each subpackage is seeded independently.
  seed-js-repos-with-subpackages:
    if: ${{ fromJson(needs.setup.outputs.has_javascript_repos_with_subpackages) == true }}
    runs-on: ubuntu-latest
    needs: [setup]
    strategy:
      matrix:
        repo_config: ${{ fromJson(needs.setup.outputs.javascript_repos_with_subpackages) }}
      fail-fast: false
      max-parallel: 3
    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - name: Validate required environment variables
        run: |
          missing=0

          if [ -z "${{ vars.LMS_ACCESS_TOKEN_URL }}" ]; then
            echo "Required variable LMS_ACCESS_TOKEN_URL is not set."
            missing=$((missing+1))
          fi
          if [ -z "${{ vars.AI_TRANSLATIONS_SEED_TRANSLATIONS_URL }}" ]; then
            echo "Required variable AI_TRANSLATIONS_SEED_TRANSLATIONS_URL is not set."
            missing=$((missing+1))
          fi

          # Mask the client ID and secret to prevent it from being logged
          echo "::add-mask::${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_ID }}"
          echo "::add-mask::${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_SECRET }}"

          # Validate that the client ID is defined
          if [ -z "${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_ID }}" ]; then
            echo "Required secret EDX_TRANSLATIONS_PROD_CLIENT_ID is not set."
            missing=$((missing+1))
          fi

          # Validate that the client secret is defined
          if [ -z "${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_SECRET }}" ]; then
            echo "Required secret EDX_TRANSLATIONS_PROD_CLIENT_SECRET is not set."
            missing=$((missing+1))
          fi

          if [ "$missing" -ne 0 ]; then
            echo "One or more required variables or secrets are missing. Please configure them in the repository settings under Secrets and variables."
            exit 1
          fi

      - name: Seed translation languages for ${{ matrix.repo_config.repo }} subpackages
        env:
          LMS_ACCESS_TOKEN_URL: ${{ vars.LMS_ACCESS_TOKEN_URL }}
          EDX_TRANSLATIONS_PROD_CLIENT_ID: ${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_ID }}
          EDX_TRANSLATIONS_PROD_CLIENT_SECRET: ${{ secrets.EDX_TRANSLATIONS_PROD_CLIENT_SECRET }}
        run: |
          . .github/scripts/fetch_jwt.sh

          translation_languages='${{ needs.setup.outputs.translation_languages }}'
          packages='${{ toJSON(matrix.repo_config.packages) }}'

          num_failures=0
          num_attempted=0

          # Loop through each subpackage in the monorepo.
          for package in $(echo "$packages" | jq -r '.[]'); do
            echo "Processing package $package in ${{ matrix.repo_config.repo }}."

            i18n_dir="translations/${{ matrix.repo_config.repo }}/packages/${package}/src/i18n"
            source_strings_file_path="${i18n_dir}/transifex_input.json"

            # Skip packages whose source strings haven't been extracted yet.
            if [ ! -f "$source_strings_file_path" ]; then
              echo "Source strings file does not exist: $source_strings_file_path. Skipping package."
              echo ""
              continue
            fi

            # Loop through selected languages for this package.
            for lang in $(echo "$translation_languages" | jq -c '.[]'); do
              # Re-fetch JWT per language to prevent token expiry on long-running jobs.
              fetch_jwt || exit 1

              edxLang=$(echo "$lang" | jq -r '.edxLang')
              repoLang=$(echo "$lang" | jq -r '.repoLang')

              echo "Processing language $edxLang for package $package."

              translations_file_path="${i18n_dir}/messages/${repoLang}.json"

              # Skip individual languages that haven't been translated yet; not every package
              # has a file for every supported language.
              if [ ! -f "$translations_file_path" ]; then
                echo "Translations file does not exist: $translations_file_path. Skipping."
                echo ""
                continue
              fi

              num_attempted=$((num_attempted+1))

              > /tmp/seed_translations_response.txt
              curl_exit_code=0
              status_code=$(curl -sS --connect-timeout 10 --max-time 180 \
                -w "%{http_code}" \
                -o /tmp/seed_translations_response.txt \
                -X POST "${{ vars.AI_TRANSLATIONS_SEED_TRANSLATIONS_URL }}" \
                -F "application_name=${{ matrix.repo_config.repo }}/${package}" \
                -F "translation_language=$edxLang" \
                -F "source_language=en" \
                -F "translation_file=@$translations_file_path" \
                -F "source_file=@$source_strings_file_path" \
                -H "Authorization: JWT ${JWT_TOKEN}") || curl_exit_code=$?

              if [ "$curl_exit_code" -ne 0 ]; then
                echo "Curl request to seed translations failed for language $edxLang for package $package with exit code $curl_exit_code."
                cat /tmp/seed_translations_response.txt
                num_failures=$((num_failures+1))
                continue
              fi

              if [ "$status_code" -eq 200 ]; then
                echo "API call to seed translations succeeded for language $edxLang for package $package."
              else
                echo "API call to seed translations failed for language $edxLang for package $package with status code $status_code."
                cat /tmp/seed_translations_response.txt
                num_failures=$((num_failures+1))
              fi

              echo ""
            done
          done

          if [ "$num_attempted" -eq 0 ]; then
            echo "Warning: No translations were seeded for ${{ matrix.repo_config.repo }}. Check that translation files exist at the expected paths."
          fi

          if [ "$num_failures" -ne 0 ]; then
            echo "One or more packages in ${{ matrix.repo_config.repo }} failed to be seeded. Failing job."
            exit 1
          fi
